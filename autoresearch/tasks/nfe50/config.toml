# AutoResearch task config for the moderate-budget assignment case.

[task]
name = "cifar10-nfe50"
nfe_case = 50
fixed_config = "../../fixed_nfe50.toml"
baseline_run = "runs/000-baseline"
max_trials = 3

[baseline_proposal]
name = "baseline-heun-edm-nfe50"
hypothesis = "Baseline EDM-style Heun sampler under the fixed NFE 50 budget."
timestep_or_noise_schedule = "edm discretization with linear sigma schedule"
update_rule = "heun"
solver_type = "heun"
stochastic_updates = "disabled"
budget_allocation = "maximum number of Heun steps under the fixed NFE budget"
score_manipulation = "none"

[baseline_sampler]
solver = "heun"
discretization = "edm"
schedule = "linear"
scaling = "none"
rho = 7
S_churn = 0
S_min = 0
S_max = inf
S_noise = 1

[llm]
# Optional shell command. The prompt is sent on stdin and the command should
# print the next experiment config TOML on stdout.
command = ""
